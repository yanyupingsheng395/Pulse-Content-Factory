<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>PCF 设置</title>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --border:#334155; }
        body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; }
        header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 24px; }
        header a { color: var(--accent); text-decoration: none; }
        main { max-width: 720px; margin: 0 auto; padding: 24px; }
        h1 { font-size: 1.25rem; margin: 0 0 8px; }
        .banner { background: #14532d; color: #bbf7d0; padding: 10px 14px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        fieldset { border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 20px; background: var(--card); }
        legend { padding: 0 8px; color: var(--muted); font-size: 0.85rem; }
        label { display: block; font-size: 0.8rem; color: var(--muted); margin-top: 12px; }
        label:first-of-type { margin-top: 0; }
        input[type=text], input[type=password], textarea, select {
            width: 100%; box-sizing: border-box; margin-top: 4px; padding: 8px 10px;
            border-radius: 6px; border: 1px solid var(--border); background: #0f172a; color: var(--text);
        }
        textarea { min-height: 72px; font-family: inherit; }
        button[type=submit] {
            margin-top: 8px; padding: 10px 20px; border-radius: 8px; border: none;
            background: var(--accent); color: #0f172a; font-weight: 600; cursor: pointer;
        }
        .hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    </style>
</head>
<body>
<header>
    <a href="/">← 任务看板</a>
    <strong>可视化配置</strong>
</header>
<main>
    <h1>PCF V2 设置</h1>
    <p class="hint">此处保存的配置会覆盖 <code>application.yml</code> 中的默认值（SQLite 持久化）。</p>
    <div class="banner" th:if="${saved}">已保存。</div>
    <form method="post" th:action="@{/settings}">
        <fieldset>
            <legend>大模型 · DeepSeek</legend>
            <label>Base URL
                <input type="text" name="deepseekBaseUrl" th:value="${s.deepseekBaseUrl}"/>
            </label>
            <label>API Key
                <input type="password" name="deepseekApiKey" th:value="${s.deepseekApiKey}" placeholder="留空则不修改已存密钥时可留空"/>
            </label>
            <label>Model
                <input type="text" name="deepseekModel" th:value="${s.deepseekModel}"/>
            </label>
        </fieldset>
        <fieldset>
            <legend>大模型 · SiliconFlow（TTS 等）</legend>
            <label>Base URL
                <input type="text" name="siliconflowBaseUrl" th:value="${s.siliconflowBaseUrl}"/>
            </label>
            <label>API Key
                <input type="password" name="siliconflowApiKey" th:value="${s.siliconflowApiKey}"/>
            </label>
            <label>Model
                <input type="text" name="siliconflowModel" th:value="${s.siliconflowModel}"/>
            </label>
        </fieldset>
        <fieldset>
            <legend>MoneyPrinterTurbo</legend>
            <label>API 根地址
                <input type="text" name="mptBaseUrl" th:value="${s.mptBaseUrl}" placeholder="http://127.0.0.1:8080"/>
            </label>
            <p class="hint">对应 MPT 文档 <code>/videos</code>、<code>/tasks/{id}</code>，端口以对方服务为准。</p>
            <label>默认配音 voice_name
                <input type="text" name="defaultVoiceName" th:value="${s.defaultVoiceName}"/>
            </label>
            <label>默认画幅
                <input type="text" name="defaultVideoAspect" th:value="${s.defaultVideoAspect}" placeholder="9:16"/>
            </label>
        </fieldset>
        <fieldset>
            <legend>渲染模式</legend>
            <label>模式
                <select name="renderMode">
                    <option value="TURBO" th:selected="${s.renderMode == null || s.renderMode == '' || s.renderMode == 'TURBO'}">TURBO（MoneyPrinterTurbo）</option>
                    <option value="LOCAL" th:selected="${s.renderMode == 'LOCAL'}">LOCAL（本机 FFmpeg + TTS）</option>
                </select>
            </label>
        </fieldset>
        <fieldset>
            <legend>素材与其它</legend>
            <label>本地单反/素材库路径
                <input type="text" name="localFootageDir" th:value="${s.localFootageDir}"/>
            </label>
            <label>抖音 Cookie / Token（明文存储）
                <textarea name="cookieDouyin" th:text="${s.cookieDouyin}"></textarea>
            </label>
            <label>小红书 Cookie / Token
                <textarea name="cookieXiaohongshu" th:text="${s.cookieXiaohongshu}"></textarea>
            </label>
        </fieldset>
        <button type="submit">保存设置</button>
    </form>
</main>
</body>
</html>
